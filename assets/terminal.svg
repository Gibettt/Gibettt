<svg xmlns="http://www.w3.org/2000/svg" width="600" height="180" viewBox="0 0 600 180">
  <!-- Terminal window -->
  <rect width="600" height="180" rx="8" fill="#0d1117"/>
  <rect width="600" height="30" rx="8" fill="#161b22"/>
  <rect x="0" y="22" width="600" height="8" fill="#161b22"/>

  <!-- Traffic lights -->
  <circle cx="18" cy="15" r="6" fill="#ff5f57"/>
  <circle cx="38" cy="15" r="6" fill="#febc2e"/>
  <circle cx="58" cy="15" r="6" fill="#28c840"/>

  <!-- Terminal text -->
  <text x="20" y="60" fill="#58a6ff" font-family="monospace" font-size="14">
    $ whoami
  </text>
  <text x="20" y="82" fill="#8b949e" font-family="monospace" font-size="14" opacity="0">
    Gibettt - Full-Stack Developer
    <animate attributeName="opacity" values="0;1" begin="0.5s" dur="0.3s" fill="freeze"/>
  </text>

  <text x="20" y="110" fill="#58a6ff" font-family="monospace" font-size="14" opacity="0">
    $ cat skills.txt
    <animate attributeName="opacity" values="0;1" begin="1s" dur="0.3s" fill="freeze"/>
  </text>
  <text x="20" y="132" fill="#3fb950" font-family="monospace" font-size="14" opacity="0">
    Laravel • React • Tailwind • Arduino • UI/UX
    <animate attributeName="opacity" values="0;1" begin="1.5s" dur="0.3s" fill="freeze"/>
  </text>

  <text x="20" y="160" fill="#58a6ff" font-family="monospace" font-size="14" opacity="0">
    $ cat goals.txt
    <animate attributeName="opacity" values="0;1" begin="2s" dur="0.3s" fill="freeze"/>
  </text>
  <text x="20" y="178" fill="#d2a8ff" font-family="monospace" font-size="14" opacity="0">
    Build impactful products with creativity + tech
    <animate attributeName="opacity" values="0;1" begin="2.5s" dur="0.3s" fill="freeze"/>
  </text>

  <!-- Blinking cursor -->
  <rect x="20" y="148" width="8" height="16" fill="#58a6ff" opacity="0">
    <animate attributeName="opacity" values="0;0" dur="0.01s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1" begin="3s" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
