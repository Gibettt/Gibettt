<svg xmlns="http://www.w3.org/2000/svg" width="700" height="50">
  <style>
    text { font-family: 'Segoe UI', sans-serif; font-size: 12px; font-weight: 600; }
  </style>

  <!-- Laravel -->
  <g opacity="0">
    <rect x="0" y="8" width="85" height="28" rx="14" fill="none" stroke="#f05340" stroke-width="1.5"/>
    <text x="42" y="27" text-anchor="middle" fill="#f05340">Laravel</text>
    <animate attributeName="opacity" values="0;1" dur="0.4s" fill="freeze"/>
  </g>

  <!-- React -->
  <g opacity="0">
    <rect x="95" y="8" width="75" height="28" rx="14" fill="none" stroke="#61dafb" stroke-width="1.5"/>
    <text x="132" y="27" text-anchor="middle" fill="#61dafb">React</text>
    <animate attributeName="opacity" values="0;1" begin="0.2s" dur="0.4s" fill="freeze"/>
  </g>

  <!-- Tailwind -->
  <g opacity="0">
    <rect x="180" y="8" width="85" height="28" rx="14" fill="none" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="222" y="27" text-anchor="middle" fill="#38bdf8">Tailwind</text>
    <animate attributeName="opacity" values="0;1" begin="0.4s" dur="0.4s" fill="freeze"/>
  </g>

  <!-- Arduino -->
  <g opacity="0">
    <rect x="275" y="8" width="80" height="28" rx="14" fill="none" stroke="#00979d" stroke-width="1.5"/>
    <text x="315" y="27" text-anchor="middle" fill="#00979d">Arduino</text>
    <animate attributeName="opacity" values="0;1" begin="0.6s" dur="0.4s" fill="freeze"/>
  </g>

  <!-- Node.js -->
  <g opacity="0">
    <rect x="365" y="8" width="80" height="28" rx="14" fill="none" stroke="#3fb950" stroke-width="1.5"/>
    <text x="405" y="27" text-anchor="middle" fill="#3fb950">Node.js</text>
    <animate attributeName="opacity" values="0;1" begin="0.8s" dur="0.4s" fill="freeze"/>
  </g>

  <!-- PHP -->
  <g opacity="0">
    <rect x="455" y="8" width="55" height="28" rx="14" fill="none" stroke="#8892be" stroke-width="1.5"/>
    <text x="482" y="27" text-anchor="middle" fill="#8892be">PHP</text>
    <animate attributeName="opacity" values="0;1" begin="1s" dur="0.4s" fill="freeze"/>
  </g>

  <!-- JavaScript -->
  <g opacity="0">
    <rect x="520" y="8" width="100" height="28" rx="14" fill="none" stroke="#f7df1e" stroke-width="1.5"/>
    <text x="570" y="27" text-anchor="middle" fill="#f7df1e">JavaScript</text>
    <animate attributeName="opacity" values="0;1" begin="1.2s" dur="0.4s" fill="freeze"/>
  </g>

  <!-- Python -->
  <g opacity="0">
    <rect x="630" y="8" width="75" height="28" rx="14" fill="none" stroke="#3776ab" stroke-width="1.5"/>
    <text x="667" y="27" text-anchor="middle" fill="#3776ab">Python</text>
    <animate attributeName="opacity" values="0;1" begin="1.4s" dur="0.4s" fill="freeze"/>
  </g>
</svg>
